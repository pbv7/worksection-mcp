# Docker Compose for production deployment
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  worksection-mcp:
    image: worksection-mcp:latest
    container_name: worksection-mcp
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - MCP_TRANSPORT=streamable-http
      - MCP_SERVER_HOST=${MCP_SERVER_HOST:-0.0.0.0}
    volumes:
      # Use named volumes for persistent data
      - token_data:/app/data/tokens
      - file_cache:/app/data/files
      - offload_data:/app/data/offload
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  token_data:
    driver: local
  file_cache:
    driver: local
  offload_data:
    driver: local

networks:
  default:
    name: worksection-mcp-network
